name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            python3 \
            python3-dev \
            python3-pip \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libffi-dev \
            libssl-dev \
            openjdk-17-jdk \
            zip \
            unzip \
            autoconf \
            automake \
            libtool \
            pkg-config \
            libncurses5 \
            libncursesw5 \
            libunwind-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Buildozer and Kivy
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.33
          pip install buildozer
          pip install kivy

      - name: Build APK with Buildozer
        run: |
          # Use 'yes' only to accept Android SDK licenses if prompted
          yes | buildozer android debug
        continue-on-error: false

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mamlkah-apk
          path: bin/*.apk
